<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brands</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="swiper">
      <h3>Ремонт техники различных брендов</h2>
      <ul class="swiper-wrapper brand__list">
        <li class="swiper-slide brand__item">
          <a href="#">
            <img src="./assets/img/cat1.svg" alt="Lenovo" class="brand__img" />
          </a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#" class="brand__link"
            ><img src="./assets/img/cat1copy.svg" alt="Samsung" class="brand__img"
          /></a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#" class="brand__link">
            <img src="./assets/img/cat1copy3.svg" alt="ViewSonic" class="brand__img" />
          </a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#" class="brand__link">
            <img src="./assets/img/cat1_copy_2.svg" alt="Apple" class="brand__img"
          /></a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#" class="brand__link">
            <img src="./assets/img/cat1copy3.svg" alt="ViewSonic" class="brand__img" />
          </a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#" class="brand__link">
            <img src="./assets/img/cat1copy7.svg" alt="Bosh" class="brand__img" />
          </a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#">
            <img src="./assets/img/cat1copy8.svg" alt="HP" class="brand__img" />
          </a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#" class="brand__link">
            <img src="./assets/img/cat1copy9.svg" alt="ACER" class="brand__img" />
          </a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#">
            <img src="./assets/img/cat1.svg" alt="Lenovo" class="brand__img" />
          </a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#" class="brand__link"
            ><img src="./assets/img/cat1copy.svg" alt="Samsung" class="brand__img"
          /></a>
        </li>
        <li class="swiper-slide brand__item">
          <a href="#" class="brand__link">
            <img src="./assets/img/cat1copy3.svg" alt="ViewSonic" class="brand__img" />
          </a>
        </li>
      </ul>
      <button class="expand-btn" id="expandBtn" type="button">
        <span class="expand-button__icon"
          ><img src="./img/show-icon.svg" alt=""
        /></span>
        <span class="expand-button__text">Показать все</span>
      </button>
      <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
